<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算数・数学ドリル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e1117;color:#f0f0f0;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.app{max-width:560px;margin:0 auto;padding:0 1rem 2rem}
/* header */
.hdr{background:#161b27;border-bottom:1px solid #2a3040;padding:.8rem 1.4rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.hdr-title{font-size:1.05rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-stats{display:flex;gap:.9rem;font-size:.78rem;font-family:monospace}
/* select screen */
.hero{text-align:center;padding:1.4rem 1.2rem 1.2rem;background:#f8f9fb;border-radius:14px;margin-bottom:.8rem}
.hero h1{font-size:1.4rem;font-weight:700;margin:.4rem 0 .3rem;color:#1a202c}
.hero p{color:#4a5568;font-size:.8rem}
.level-card{background:#1e2638;border:2px solid #3a4560;border-radius:12px;padding:.85rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.85rem;margin-bottom:.5rem;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.level-card.selected{box-shadow:0 0 0 3px rgba(129,140,248,.3)}
.level-icon{font-size:1.4rem}
.level-info{flex:1}
.level-label{display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem}
.level-badge{font-family:monospace;font-weight:700;font-size:.72rem;border-radius:5px;padding:.1rem .45rem;border:1px solid}
.level-name{font-weight:700;font-size:.9rem}
.level-pbar-wrap{display:flex;align-items:center;gap:.4rem;margin-top:.3rem}
.level-pbar-bg{flex:1;background:#1e2540;border-radius:3px;height:4px}
.level-pbar-fill{height:100%;border-radius:3px}
.level-pct{font-size:.65rem;color:#6b7280;font-family:monospace}
.level-unseen{font-size:.65rem;color:#8b9ab0;margin-top:.2rem}
.btn-start{width:100%;padding:1rem;border:none;border-radius:12px;font-size:.98rem;font-weight:700;margin-top:.5rem;transition:all .2s}
/* stats bar */
.statsbar{background:#161b27;border:1px solid #2a3040;border-radius:12px;padding:1rem 1.2rem;margin-top:.5rem}
.statsbar-title{font-size:.75rem;color:#9ca3af;font-weight:700;margin-bottom:.7rem}
.statsbar-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.sb-lv{font-size:.7rem;font-family:monospace;font-weight:700;min-width:32px}
.sb-name{font-size:.7rem;color:#6b7280;min-width:88px}
.sb-bar{flex:1;background:#1e2540;border-radius:4px;height:6px;overflow:hidden}
.sb-fill{height:100%;border-radius:4px;transition:width .5s}
.sb-pct{font-size:.68rem;color:#9ca3af;min-width:54px;text-align:right;font-family:monospace}
/* quiz screen */
.progress-wrap{height:3px;background:#1e2540}
.progress-fill{height:100%;transition:width .4s}
.q-card{background:#161b27;border:1px solid #2a3040;border-radius:14px;padding:1.3rem;position:relative;overflow:hidden;margin:1rem 0 .8rem}
.q-card-top{position:absolute;top:0;left:0;right:0;height:3px}
.q-no{font-size:.68rem;color:#4b5563;font-family:monospace;margin-bottom:.5rem}
.q-text{font-size:1.1rem;font-weight:700;line-height:1.9}
.choices{display:flex;flex-direction:column;gap:.45rem}
.choice-btn{border:1.5px solid #2a3040;border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;text-align:left;width:100%;color:#f0f0f0;background:#161b27;transition:all .18s;font-size:.9rem;line-height:1.55}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{border-color:#4ade80;background:rgba(74,222,128,.08)}
.choice-btn.wrong{border-color:#f87171;background:rgba(248,113,113,.08)}
.choice-btn.dim{border-color:#1e2540;background:#0e1117}
.choice-lbl{min-width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:.7rem;font-weight:700;flex-shrink:0;background:#1e2540;color:#6b7280}
.choice-lbl.correct{background:#4ade80;color:#000}
.choice-lbl.wrong{background:#f87171;color:#000}
.choice-lbl.dim{background:#1e2540;color:#374151}
.choice-mark{margin-left:auto;font-size:.9rem}
.explanation{border-radius:12px;padding:1rem 1.1rem;margin-top:.6rem}
.explanation.ok{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.25)}
.explanation.ng{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.25)}
.ex-title{font-weight:700;margin-bottom:.5rem;font-size:.92rem}
.ex-title.ok{color:#4ade80}
.ex-title.ng{color:#f87171}
.ex-body{font-size:.85rem;line-height:2;color:#d1d5db;border-top:1px solid rgba(255,255,255,.06);padding-top:.6rem}
.ex-label{color:#818cf8;font-weight:700;margin-right:.4rem}
.btn-next{width:100%;padding:.85rem;background:#161b27;border:1.5px solid #2a3040;border-radius:10px;color:#f0f0f0;font-size:.95rem;font-weight:700;margin-top:.6rem}
/* result screen */
.result-hero{text-align:center;padding:1.6rem 0 .5rem}
.result-emoji{font-size:2.4rem}
.result-score{font-size:3.2rem;font-weight:700;line-height:1.1}
.result-msg{display:flex;justify-content:center;align-items:center;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
.result-msg span{color:#9ca3af;font-size:.85rem}
.review-card{background:#161b27;border:1px solid #2a3040;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.review-row{padding:.85rem 1rem;display:flex;gap:.7rem;align-items:flex-start;border-bottom:1px solid #1e2540}
.review-row:last-child{border-bottom:none}
.review-no{font-family:monospace;font-size:.65rem;color:#4b5563;min-width:28px;padding-top:2px}
.review-body{flex:1}
.review-q{font-size:.82rem;line-height:1.6;margin-bottom:.2rem}
.review-ok{font-size:.7rem;color:#4ade80}
.review-ng{font-size:.7rem;color:#f87171}
.review-ex{margin-top:.4rem;font-size:.75rem;line-height:1.85;color:#9ca3af;background:rgba(129,140,248,.05);border-radius:6px;padding:.5rem .65rem;border-left:2px solid}
.review-icon{font-size:1rem;flex-shrink:0}
.btn-retry{width:100%;padding:.95rem;border:none;border-radius:10px;color:#fff;font-size:.98rem;font-weight:700;margin-bottom:.5rem;box-shadow:0 4px 16px rgba(129,140,248,.3)}
.btn-back{width:100%;padding:.88rem;background:transparent;border:1.5px solid #2a3040;border-radius:10px;color:#9ca3af;font-size:.88rem}
</style>
</head>
<body>
<div id="root"></div>
<script>
const LABELS = ["A","B","C","D","E"];
const LEVELS = [
  {id:1,label:"Lv.1",name:"小学校 1〜3年",color:"#34d399",bg:"rgba(52,211,153,0.12)",border:"rgba(52,211,153,0.4)",icon:"🌱"},
  {id:2,label:"Lv.2",name:"小学校 4〜6年",color:"#60a5fa",bg:"rgba(96,165,250,0.12)",border:"rgba(96,165,250,0.4)",icon:"📗"},
  {id:3,label:"Lv.3",name:"中学 1〜2年",  color:"#f59e0b",bg:"rgba(245,158,11,0.12)", border:"rgba(245,158,11,0.4)", icon:"📘"},
  {id:4,label:"Lv.4",name:"中学 3年",     color:"#f97316",bg:"rgba(249,115,22,0.12)", border:"rgba(249,115,22,0.4)", icon:"📙"},
  {id:5,label:"Lv.5",name:"高校 1年",     color:"#e879f9",bg:"rgba(232,121,249,0.12)",border:"rgba(232,121,249,0.4)",icon:"📕"},
];
const Q = {
1:[
  {id:101,q:"1 + 1 = ?",c:["2","1","3","0","11"],a:0,ex:"1つと1つを合わせると2つになります。1＋1＝2 です。"},
  {id:102,q:"2 + 3 = ?",c:["5","4","6","7","3"],a:0,ex:"2つと3つを合わせると5つになります。2＋3＝5 です。"},
  {id:103,q:"7 − 4 = ?",c:["3","2","4","11","1"],a:0,ex:"7つから4つとると3つ残ります。7－4＝3 です。"},
  {id:104,q:"5 + 5 = ?",c:["10","9","11","0","55"],a:0,ex:"5と5を足すと10です。5＋5＝10"},
  {id:105,q:"9 − 3 = ?",c:["6","5","7","12","3"],a:0,ex:"9から3を引くと6です。9－3＝6"},
  {id:106,q:"3 × 2 = ?",c:["6","5","7","8","9"],a:0,ex:"3を2回足すと6です。3＋3＝6 と同じことです。"},
  {id:107,q:"4 × 3 = ?",c:["12","7","9","16","8"],a:0,ex:"4を3回足します。4＋4＋4＝12 です。"},
  {id:108,q:"6 ÷ 2 = ?",c:["3","4","2","6","12"],a:0,ex:"6個を2人で同じ数ずつ分けると1人3個です。6÷2＝3"},
  {id:109,q:"10 − 6 = ?",c:["4","5","3","6","16"],a:0,ex:"10から6を引きます。10－6＝4 です。"},
  {id:110,q:"5 × 5 = ?",c:["25","10","20","30","15"],a:0,ex:"5の段：5, 10, 15, 20, 25。5×5＝25 です。"},
  {id:111,q:"15 ÷ 3 = ?",c:["5","3","6","4","45"],a:0,ex:"15を3で割ります。3×5＝15なので、15÷3＝5 です。"},
  {id:112,q:"8 + 7 = ?",c:["15","14","16","1","56"],a:0,ex:"8＋7。8に2を足して10にして、残りの5を足すと15です。"},
  {id:113,q:"20 − 8 = ?",c:["12","11","13","28","8"],a:0,ex:"20から8を引きます。20－8＝12 です。"},
  {id:114,q:"7 × 4 = ?",c:["28","24","32","11","3"],a:0,ex:"7の段：7, 14, 21, 28。7×4＝28 です。"},
  {id:115,q:"24 ÷ 4 = ?",c:["6","5","8","4","96"],a:0,ex:"4×6＝24 なので、24÷4＝6 です。"},
  {id:116,q:"13 + 9 = ?",c:["22","21","23","4","117"],a:0,ex:"13＋9。13に7を足して20、残りの2を足すと22です。"},
  {id:117,q:"30 − 14 = ?",c:["16","15","17","44","14"],a:0,ex:"30－14。30－10＝20、20－4＝16 です。"},
  {id:118,q:"9 × 8 = ?",c:["72","63","81","17","64"],a:0,ex:"9の段：9×8。10×8＝80 から 1×8＝8 を引くと 72 です。"},
  {id:119,q:"36 ÷ 6 = ?",c:["6","5","7","4","216"],a:0,ex:"6×6＝36 なので、36÷6＝6 です。"},
  {id:120,q:"25 + 17 = ?",c:["42","41","43","8","425"],a:0,ex:"25＋17。20＋10＝30、5＋7＝12、合わせて42です。"},
],
2:[
  {id:201,q:"0.5 + 0.3 = ?",c:["0.8","0.15","8","0.53","1.8"],a:0,ex:"小数の足し算です。0.5は5/10、0.3は3/10なので、足すと8/10＝0.8です。"},
  {id:202,q:"1.2 − 0.7 = ?",c:["0.5","0.6","1.5","0.7","1.9"],a:0,ex:"1.2から0.7を引きます。1.2＝1.0＋0.2なので、1.0－0.7＝0.3、0.3＋0.2＝0.5です。"},
  {id:203,q:"2.4 × 3 = ?",c:["7.2","6.4","7.4","5.2","72"],a:0,ex:"2.4を3倍します。2×3＝6、0.4×3＝1.2、合わせて7.2です。"},
  {id:204,q:"7.5 ÷ 3 = ?",c:["2.5","3.5","4.5","2.25","25"],a:0,ex:"7.5を3で割ります。6÷3＝2、1.5÷3＝0.5、合わせて2.5です。"},
  {id:205,q:"3/4 + 1/4 = ?",c:["1","4/8","2/4","7/4","4/4"],a:0,ex:"分母が同じとき、分子どうしを足します。3＋1＝4で、4/4＝1です。"},
  {id:206,q:"1/2 + 1/4 = ?",c:["3/4","2/6","1/2","1/8","2/4"],a:0,ex:"分母をそろえます（通分）。1/2＝2/4なので、2/4＋1/4＝3/4です。"},
  {id:207,q:"1/2 + 1/3 = ?",c:["5/6","2/5","2/6","1/6","3/5"],a:0,ex:"通分します。1/2＝3/6、1/3＝2/6、足すと5/6です。"},
  {id:208,q:"3/4 − 1/2 = ?",c:["1/4","1/2","2/2","1/8","3/8"],a:0,ex:"通分します。3/4－2/4＝1/4です。"},
  {id:209,q:"2/3 × 3 = ?",c:["2","3/3","6/9","2/9","2/3"],a:0,ex:"分数×整数は分子にかけます。2×3＝6なので6/3＝2です。"},
  {id:210,q:"1/2 × 2/3 = ?",c:["1/3","2/6","3/4","1/6","2/3"],a:0,ex:"分数どうしのかけ算は分子×分子、分母×分母です。1×2＝2、2×3＝6なので2/6＝1/3です。"},
  {id:211,q:"1/2 ÷ 1/4 = ?",c:["2","1/2","1/8","4","1/4"],a:0,ex:"分数のわり算は、割る数の逆数をかけます。1/2×4/1＝4/2＝2です。"},
  {id:212,q:"2/3 ÷ 1/3 = ?",c:["2","1","3","2/9","6"],a:0,ex:"2/3÷1/3。割る数の逆数は3/1＝3。2/3×3＝2です。"},
  {id:213,q:"100 の 30% はいくら？",c:["30","3","300","13","0.3"],a:0,ex:"100の30%は100×0.3＝30です。%は100分のいくつかを表します。"},
  {id:214,q:"200 円の 5% はいくら？",c:["10","20","1","100","5"],a:0,ex:"200×0.05＝10円です。5%は5/100なので0.05をかけます。"},
  {id:215,q:"80 は 200 の何%？",c:["40%","8%","4%","80%","20%"],a:0,ex:"80÷200＝0.4＝40%です。割って100倍すると%になります。"},
  {id:216,q:"時速 60 km で 3 時間走ると？",c:["180 km","20 km","63 km","180 m","18 km"],a:0,ex:"距離＝速さ×時間です。60×3＝180 kmです。"},
  {id:217,q:"12 の約数は何個？",c:["6","4","3","12","8"],a:0,ex:"12の約数：1,2,3,4,6,12の6個です。約数とは割り切れる整数のことです。"},
  {id:218,q:"6 と 9 の最大公約数は？",c:["3","6","9","18","1"],a:0,ex:"6の約数：1,2,3,6。9の約数：1,3,9。共通する最大の数は3です。"},
  {id:219,q:"4 と 6 の最小公倍数は？",c:["12","24","6","4","2"],a:0,ex:"4の倍数：4,8,12,16…。6の倍数：6,12,18…。共通する最小の数は12です。"},
  {id:220,q:"√9 = ?",c:["3","9","4","2","81"],a:0,ex:"√（ルート）は2乗してその数になるものです。3×3＝9なので、√9＝3です。"},
],
3:[
  {id:301,q:"x + x + x を簡単にせよ",c:["3x","x³","3","x+3","xxx"],a:0,ex:"xが3個あるので3×x＝3xです。文字式では係数と文字をくっつけて書きます。"},
  {id:302,q:"2x + 3x を計算せよ",c:["5x","6x","5x²","5","2x+3"],a:0,ex:"同じ文字xの係数を足します。2＋3＝5なので5xです。"},
  {id:303,q:"5a − 2a を計算せよ",c:["3a","7a","3a²","10a","3"],a:0,ex:"5aから2aを引きます。5－2＝3なので3aです。"},
  {id:304,q:"x = 3 のとき 2x の値は？",c:["6","5","9","2","3"],a:0,ex:"2xのxに3を代入します。2×3＝6です。"},
  {id:305,q:"x = 2 のとき 3x + 1 の値は？",c:["7","6","9","5","8"],a:0,ex:"xに2を代入します。3×2＋1＝6＋1＝7です。"},
  {id:306,q:"x + 3 = 7 を解け",c:["x=4","x=10","x=3","x=7","x=1"],a:0,ex:"両辺から3を引きます。x＝7－3＝4です。"},
  {id:307,q:"2x = 8 を解け",c:["x=4","x=16","x=6","x=2","x=8"],a:0,ex:"両辺を2で割ります。x＝8÷2＝4です。"},
  {id:308,q:"3x + 1 = 10 を解け",c:["x=3","x=4","x=11","x=2","x=9"],a:0,ex:"まず1を移項します。3x＝10－1＝9、x＝9÷3＝3です。"},
  {id:309,q:"2x − 3 = 7 を解け",c:["x=5","x=2","x=4","x=7","x=10"],a:0,ex:"まず−3を移項します。2x＝7＋3＝10、x＝10÷2＝5です。"},
  {id:310,q:"x/2 = 4 を解け",c:["x=8","x=2","x=6","x=4","x=16"],a:0,ex:"両辺に2をかけます。x＝4×2＝8です。"},
  {id:311,q:"5x − 2x = 9 を解け",c:["x=3","x=9","x=1","x=7","x=4"],a:0,ex:"左辺をまとめます。3x＝9、x＝9÷3＝3です。"},
  {id:312,q:"2(x + 3) = 10 を解け",c:["x=2","x=8","x=5","x=4","x=3"],a:0,ex:"まず展開します。2x＋6＝10、2x＝4、x＝2です。"},
  {id:313,q:"(−3) × (−4) = ?",c:["12","−12","7","−7","1"],a:0,ex:"マイナス×マイナス＝プラスです。3×4＝12なので12です。"},
  {id:314,q:"(+12) ÷ (−4) = ?",c:["−3","3","−8","8","−48"],a:0,ex:"プラス÷マイナス＝マイナスです。12÷4＝3なので−3です。"},
  {id:315,q:"|−7| = ?",c:["7","−7","0","49","1"],a:0,ex:"絶対値はその数の符号を取り除いた大きさです。|−7|＝7です。"},
  {id:316,q:"|3| + |−5| = ?",c:["8","2","−2","15","−8"],a:0,ex:"絶対値をそれぞれ求めます。|3|＝3、|−5|＝5。3＋5＝8です。"},
  {id:317,q:"2(x + 3) を展開せよ",c:["2x+6","2x+3","x+6","2x+5","2x"],a:0,ex:"分配法則：括弧の外の数を中の各項にかけます。2×x＋2×3＝2x＋6です。"},
  {id:318,q:"3(2x − 1) を展開せよ",c:["6x−3","6x−1","5x−3","6x+3","3x−3"],a:0,ex:"分配法則：3×2x＝6x、3×(−1)＝−3。合わせて6x－3です。"},
  {id:319,q:"−2(x − 4) を展開せよ",c:["−2x+8","−2x−8","2x+8","−2x+4","2x−8"],a:0,ex:"マイナスに注意！(−2)×x＝−2x、(−2)×(−4)＝＋8。−2x＋8です。"},
  {id:320,q:"(2x+3)+(x+4) を計算せよ",c:["3x+7","3x+1","2x+7","x+7","3x+12"],a:0,ex:"同じ文字の項をまとめます。2x＋x＝3x、3＋4＝7。答えは3x＋7です。"},
],
4:[
  {id:401,q:"(x+2)² を展開せよ",c:["x²+4x+4","x²+2x+4","x²+4x+2","x²+4","x²+2x+2"],a:0,ex:"(a＋b)²＝a²＋2ab＋b²の公式を使います。a＝x, b＝2なのでx²＋2×x×2＋2²＝x²＋4x＋4です。"},
  {id:402,q:"(x−3)² を展開せよ",c:["x²−6x+9","x²+6x+9","x²−3x+9","x²−6x−9","x²−9"],a:0,ex:"(a－b)²＝a²－2ab＋b²の公式を使います。x²－2×3×x＋9＝x²－6x＋9です。"},
  {id:403,q:"(2x+1)² を展開せよ",c:["4x²+4x+1","4x²+2x+1","4x²+1","2x²+4x+1","4x²+4x+2"],a:0,ex:"a＝2x, b＝1として(a＋b)²を使います。(2x)²＋2×2x×1＋1²＝4x²＋4x＋1です。"},

// ── ユーティリティ ──
const STORAGE_KEY = “math_drill_stats_v1”;
function loadStats(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{}}catch(e){return {}}}
function saveStats(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}catch(e){}}
function pickQuestions(level,n=5){
const pool=[…Q[level]];
pool.sort(()=>Math.random()-.5);
return pool.slice(0,n).map(q=>{
const correct=q.c[q.a];
const shuffled=[…q.c].sort(()=>Math.random()-.5);
return {…q,c:shuffled,a:shuffled.indexOf(correct)};
});
}

// ── 状態管理 ──
let state = {
screen: “select”,
level: null,
questions: [],
current: 0,
selected: null,
results: [],
stats: loadStats(),
sel: null,
};

function setState(patch){
Object.assign(state, patch);
render();
}

// ── レンダリング ──
function render(){
const root = document.getElementById(“root”);
if(state.screen===“select”) root.innerHTML = renderSelect();
else if(state.screen===“quiz”) root.innerHTML = renderQuiz();
else root.innerHTML = renderResult();
bindEvents();
}

function esc(s){
return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
}

// ── SELECT SCREEN ──
function renderSelect(){
const {stats, sel} = state;
const tc = Object.values(stats).reduce((a,s)=>a+s.correct,0);
const tw = Object.values(stats).reduce((a,s)=>a+s.wrong,0);
const ta = tc+tw;
const lv = LEVELS.find(l=>l.id===sel);

let cards = LEVELS.map(l=>{
const s = stats[l.id]||{correct:0,wrong:0};
const tot = s.correct+s.wrong;
const pct = tot>0?Math.round(s.correct/tot*100):null;
const isSelected = sel===l.id;
return ` <div class="level-card${isSelected?' selected':''}" data-action="select-level" data-id="${l.id}" style="border-color:${isSelected?l.color:'#3a4560'};background:${isSelected?l.bg:'#1e2638'};${isSelected?'box-shadow:0 0 0 3px '+l.border+',0 2px 8px rgba(0,0,0,.4)':''}"> <span class="level-icon">${l.icon}</span> <div class="level-info"> <div class="level-label"> <span class="level-badge" style="color:${l.color};background:${l.bg};border-color:${l.border}">${l.label}</span> <span class="level-name">${l.name}</span> </div> ${tot>0?`<div class="level-pbar-wrap">
<div class="level-pbar-bg"><div class="level-pbar-fill" style="width:${pct}%;background:${l.color}"></div></div>
<span class="level-pct">${pct}% (${s.correct}/${tot}問)</span>
</div>`:`<div class="level-unseen">未挑戦</div>`} </div> ${isSelected?`<span style="color:${l.color};font-size:1.1rem">✓</span>`:''} </div>`;
}).join(’’);

let statsBar = ‘’;
if(ta>0){
const rows = LEVELS.map(l=>{
const s=stats[l.id]||{correct:0,wrong:0};
const tot=s.correct+s.wrong;
const pct=tot>0?Math.round(s.correct/tot*100):0;
return `<div class="statsbar-row"> <span class="sb-lv" style="color:${l.color}">${l.label}</span> <span class="sb-name">${l.name}</span> <div class="sb-bar"><div class="sb-fill" style="width:${pct}%;background:linear-gradient(90deg,${l.color},#818cf8)"></div></div> <span class="sb-pct">${tot>0?pct+'% ('+stats[l.id].correct+'/'+tot+')':'未挑戦'}</span> </div>`;
}).join(’’);
statsBar = `<div class="statsbar"><div class="statsbar-title">📊 レベル別 成績</div>${rows}</div>`;
}

const btnBg = sel ? `linear-gradient(135deg,${lv.color},#6366f1)` : ‘#1e2540’;
const btnColor = sel ? ‘#fff’ : ‘#4b5563’;
const btnLabel = sel ? `${lv.label} ${lv.name} をスタート →` : ‘難易度を選んでください’;

return `

  <header class="hdr">
    <div class="hdr-title">✦ 算数・数学ドリル</div>
    <div class="hdr-stats">
      <span>⭕ <b style="color:#4ade80">${tc}</b></span>
      <span>❌ <b style="color:#f87171">${tw}</b></span>
      ${ta>0?`<span style="color:#9ca3af">${Math.round(tc/ta*100)}%</span>`:''}
    </div>
  </header>
  <div class="app">
    <div class="hero">
      <div style="font-size:2.2rem">📚</div>
      <h1>難易度を選んでスタート</h1>
      <p>各レベルの問題からランダムに5問出題</p>
    </div>
    ${cards}
    ${statsBar}
    <button class="btn-start" data-action="start" ${sel?'':'disabled'}
      style="background:${btnBg};color:${btnColor};cursor:${sel?'pointer':'not-allowed'}">
      ${btnLabel}
    </button>
  </div>`;
}

// ── QUIZ SCREEN ──
function renderQuiz(){
const {questions,current,selected,level} = state;
const lv = LEVELS.find(l=>l.id===level);
const q = questions[current];
const total = questions.length;
const answered = selected !== null;
const pct = Math.round(current/total*100);

const choices = q.c.map((c,i)=>{
let cls = ‘choice-btn’, lblCls = ‘choice-lbl’, mark = ‘’;
if(answered){
if(i===q.a){ cls+=’ correct’; lblCls+=’ correct’; mark=’<span class="choice-mark" style="color:#4ade80">✓</span>’; }
else if(i===selected){ cls+=’ wrong’; lblCls+=’ wrong’; mark=’<span class="choice-mark" style="color:#f87171">✗</span>’; }
else{ cls+=’ dim’; lblCls+=’ dim’; }
}
return `<button class="${cls}" data-action="choose" data-idx="${i}" ${answered?'disabled':''}> <span class="${lblCls}">${LABELS[i]}</span> <span>${esc(c)}</span> ${mark} </button>`;
}).join(’’);

let explanation = ‘’;
if(answered){
const ok = selected===q.a;
const title = ok ? ‘⭕ 正解！すばらしい！’ : `❌ 不正解… 正解は ${LABELS[q.a]}「${esc(q.c[q.a])}」`;
explanation = `<div class="explanation ${ok?'ok':'ng'}"> <div class="ex-title ${ok?'ok':'ng'}">${title}</div> <div class="ex-body"><span class="ex-label">💡 解説</span>${esc(q.ex)}</div> </div> <button class="btn-next" data-action="next"> ${current+1<total?'次の問題へ →':'結果を見る →'} </button>`;
}

return `

  <header class="hdr">
    <div class="hdr-title">✦ 算数・数学ドリル</div>
    <div style="display:flex;align-items:center;gap:.7rem">
      <span class="level-badge" style="color:${lv.color};background:${lv.bg};border:1px solid ${lv.border};border-radius:5px;padding:.12rem .45rem;font-family:monospace;font-size:.7rem;font-weight:700">${lv.label}</span>
      <span style="font-family:monospace;font-size:.82rem;color:#818cf8;font-weight:700">${current+1} / ${total}</span>
    </div>
  </header>
  <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${lv.color},#818cf8)"></div></div>
  <div class="app">
    <div class="q-card">
      <div class="q-card-top" style="background:linear-gradient(90deg,${lv.color},#818cf8)"></div>
      <div class="q-no">No.${q.id} · ${lv.name}</div>
      <div class="q-text">${esc(q.q)}</div>
    </div>
    <div class="choices">${choices}</div>
    ${explanation}
  </div>`;
}

// ── RESULT SCREEN ──
function renderResult(){
const {results, level} = state;
const lv = LEVELS.find(l=>l.id===level);
const score = results.filter(r=>r.correct).length;
const total = results.length;
const pct = score/total;
const emoji = pct===1?‘🏆’:pct>=.8?‘🎉’:pct>=.6?‘👍’:‘💪’;
const msg = pct===1?‘全問正解！完璧です！’:pct>=.8?‘とても良い出来です！’:pct>=.6?‘まずまず。復習してみよう！’:‘もう一度挑戦しよう！’;

const rows = results.map((r,i)=>` <div class="review-row"> <span class="review-no">問${i+1}</span> <div class="review-body"> <div class="review-q">${esc(r.question)}</div> ${r.correct ?`<div class="review-ok">✓ 正解：${LABELS[r.answerIdx]}「${esc(r.choices[r.answerIdx])}」</div>` :`<div class="review-ng">✗ あなた：${LABELS[r.userIdx]}「${esc(r.choices[r.userIdx])}」　正解：${LABELS[r.answerIdx]}「${esc(r.choices[r.answerIdx])}」</div>` } <div class="review-ex" style="border-color:${lv.color}"><span style="color:#818cf8;font-weight:700;margin-right:.3rem">💡</span>${esc(r.explanation)}</div> </div> <span class="review-icon">${r.correct?'⭕':'❌'}</span> </div>`).join(’’);

return `

  <header class="hdr">
    <div class="hdr-title">✦ 算数・数学ドリル</div>
  </header>
  <div class="app">
    <div class="result-hero">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score" style="background:linear-gradient(135deg,${lv.color},#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${score}/${total}</div>
      <div class="result-msg">
        <span class="level-badge" style="color:${lv.color};background:${lv.bg};border:1px solid ${lv.border};border-radius:5px;padding:.12rem .45rem;font-family:monospace;font-size:.72rem;font-weight:700">${lv.label} ${lv.name}</span>
        <span>${msg}</span>
      </div>
    </div>
    <div class="review-card">${rows}</div>
    <button class="btn-retry" data-action="retry" style="background:linear-gradient(135deg,${lv.color},#6366f1)">🔁 同じレベルでもう一度</button>
    <button class="btn-back" data-action="back">← レベル選択に戻る</button>
  </div>`;
}

// ── イベント処理 ──
function bindEvents(){
document.querySelectorAll(’[data-action]’).forEach(el=>{
el.addEventListener(‘click’, handleAction);
});
}

function handleAction(e){
const action = e.currentTarget.dataset.action;
if(action===‘select-level’){
setState({sel: parseInt(e.currentTarget.dataset.id)});
}
else if(action===‘start’){
if(!state.sel) return;
const qs = pickQuestions(state.sel, 5);
setState({screen:‘quiz’, level:state.sel, questions:qs, current:0, selected:null, results:[]});
}
else if(action===‘choose’){
if(state.selected!==null) return;
const idx = parseInt(e.currentTarget.dataset.idx);
const q = state.questions[state.current];
const correct = idx===q.a;
// update stats
const stats = {…state.stats};
const s = stats[state.level]||{correct:0,wrong:0};
stats[state.level] = {correct:s.correct+(correct?1:0), wrong:s.wrong+(correct?0:1)};
saveStats(stats);
setState({selected:idx, stats});
}
else if(action===‘next’){
const {questions,current,selected,results,level} = state;
const q = questions[current];
const r = {question:q.q, choices:q.c, answerIdx:q.a, userIdx:selected, correct:selected===q.a, explanation:q.ex};
const nr = […results, r];
if(current+1>=questions.length){
setState({screen:‘result’, results:nr});
} else {
setState({current:current+1, selected:null, results:nr});
}
}
else if(action===‘retry’){
const qs = pickQuestions(state.level, 5);
setState({screen:‘quiz’, questions:qs, current:0, selected:null, results:[]});
}
else if(action===‘back’){
setState({screen:‘select’, sel:state.level});
}
}

// 起動
render();
</script>
