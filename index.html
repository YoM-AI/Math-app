function pickQuestions(level, n = 5) {
const pool = […(Q[level] || [])];
pool.sort(() => Math.random() - 0.5);
return pool.slice(0, n).map(q => {
// シャッフルして正解位置をランダムにする
const correct = q.c[q.a];
const shuffled = […q.c].sort(() => Math.random() - 0.5);
const newA = shuffled.indexOf(correct);
return { …q, c: shuffled, a: newA };
});
}

function DrawingCanvas() {
const canvasRef = useRef(null);
const isDrawing = useRef(false);
const lastPos   = useRef({ x: 0, y: 0 });
const [tool,    setTool]    = useState(“pen”);
const [penSize, setPenSize] = useState(2);

useEffect(() => {
const canvas = canvasRef.current;
const dpr = window.devicePixelRatio || 1;
const resize = () => {
const w = canvas.parentElement.clientWidth;
const h = 160;
canvas.width  = w * dpr;
canvas.height = h * dpr;
canvas.style.width  = w + “px”;
canvas.style.height = h + “px”;
const ctx = canvas.getContext(“2d”);
ctx.scale(dpr, dpr);
};
resize();
}, []);

const getPos = (e) => {
const r = canvasRef.current.getBoundingClientRect();
if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
return { x: e.clientX - r.left, y: e.clientY - r.top };
};

const startDraw = (e) => {
isDrawing.current = true;
lastPos.current = getPos(e);
};

const draw = (e) => {
if (!isDrawing.current) return;
const p   = getPos(e);
const ctx = canvasRef.current.getContext(“2d”);
ctx.globalCompositeOperation = tool === “eraser” ? “destination-out” : “source-over”;
ctx.lineWidth   = tool === “eraser” ? penSize * 7 : penSize + 1;
ctx.strokeStyle = “#e8eaf0”;
ctx.lineCap     = “round”;
ctx.lineJoin    = “round”;
ctx.beginPath();
ctx.moveTo(lastPos.current.x, lastPos.current.y);
ctx.lineTo(p.x, p.y);
ctx.stroke();
lastPos.current = p;
};

const stopDraw = () => { isDrawing.current = false; };
const clear    = () => {
const c = canvasRef.current;
c.getContext(“2d”).clearRect(0, 0, c.width, c.height);
};

return (
<div style={{ background: “#0a0d14”, border: “1px solid #2a3040”, borderRadius: 10, overflow: “hidden” }}>
{/* toolbar */}
<div style={{ display: “flex”, gap: “0.4rem”, padding: “0.45rem 0.7rem”, borderBottom: “1px solid #1e2540”, alignItems: “center”, flexWrap: “wrap” }}>
<span style={{ fontSize: “0.65rem”, color: “#4b5563”, marginRight: 2 }}>✏ 計算メモ</span>
{[[“pen”,“ペン”],[“eraser”,“消”]].map(([t, lbl]) => (
<button key={t} onClick={() => setTool(t)}
style={{ background: tool===t?”#1e2540”:“transparent”, border:`1px solid ${tool===t?"#818cf8":"#2a3040"}`, color:tool===t?”#818cf8”:”#6b7280”, borderRadius:6, padding:“0.18rem 0.55rem”, fontSize:“0.68rem”, cursor:“pointer” }}>
{lbl}
</button>
))}
<button onClick={clear}
style={{ background:“transparent”, border:“1px solid #2a3040”, color:”#6b7280”, borderRadius:6, padding:“0.18rem 0.55rem”, fontSize:“0.68rem”, cursor:“pointer” }}>
🗑
</button>
<div style={{ display:“flex”, gap:5, alignItems:“center”, marginLeft:4 }}>
{[1,2,4].map(s => (
<div key={s} onClick={() => setPenSize(s)}
style={{ width: s*3+4, height: s*3+4, borderRadius:“50%”, background: penSize===s?”#818cf8”:”#374151”, cursor:“pointer”, border: penSize===s?“2px solid #c4b5fd”:“2px solid transparent”, flexShrink:0 }} />
))}
</div>
</div>
<canvas ref={canvasRef}
style={{ display:“block”, cursor:“crosshair”, touchAction:“none” }}
onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
onTouchStart={e=>{e.preventDefault();startDraw(e);}}
onTouchMove={e=>{e.preventDefault();draw(e);}}
onTouchEnd={stopDraw} />
</div>
);
}

// ─────────────────────────────────────────────
//  APP  （localStorage で成績を永続化）
// ─────────────────────────────────────────────
const STORAGE_KEY = “math_drill_stats_v1”;

function loadStats() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
return raw ? JSON.parse(raw) : {};
} catch (_) { return {}; }
}

function saveStats(stats) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch (_) {}
}

function App() {
const [screen,    setScreen]    = useState(“select”);
const [level,     setLevel]     = useState(null);
const [questions, setQuestions] = useState([]);
const [results,   setResults]   = useState([]);
const [stats,     setStats]     = useState(() => loadStats());

// stats が変わるたびに localStorage へ保存
useEffect(() => { saveStats(stats); }, [stats]);

const handleStart = useCallback((lv) => {
setLevel(lv);
setQuestions(pickQuestions(lv, 5));
setScreen(“quiz”);
}, []);

const handleRetry = useCallback(() => {
setQuestions(pickQuestions(level, 5));
setScreen(“quiz”);
}, [level]);

// 1問ごとに即時反映
const handleAnswer = useCallback((correct) => {
setStats(prev => {
const s = prev[level] || { correct:0, wrong:0 };
const next = { …prev, [level]: { correct: s.correct + (correct?1:0), wrong: s.wrong + (correct?0:1) } };
return next;
});
}, [level]);

const handleFinish = useCallback((r) => {
setResults(r);
setScreen(“result”);
}, []);

if (screen === “select”) return <SelectScreen onStart={handleStart} stats={stats} />;
if (screen === “quiz”)   return <QuizScreen   questions={questions} level={level} onFinish={handleFinish} onAnswer={handleAnswer} />;
if (screen === “result”) return <ResultScreen results={results} level={level} onRetry={handleRetry} onBack={() => setScreen(“select”)} />;
}

const root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(<App />);
</script>
